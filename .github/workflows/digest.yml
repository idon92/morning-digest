name: Morning Digest

on:
  schedule:
    # 7:00 AM Pacific = 14:00 UTC (PDT) / 15:00 UTC (PST)
    # Using 14:00 for daylight saving; runs ~1 hr early in winter
    - cron: "0 14 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser requests python-dotenv

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
        run: python digest.py
